<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counter Component Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "@async/framework-v0/jsx-runtime": "/frameworks/v0/src/jsx-runtime.ts",
          "@async/framework-v0": "/frameworks/v0/src/index.ts",
          "custom-element-signals": "/custom-element-signals.js"
        }
      }
    </script>
  </head>

  <body class="">
    <header class="w-full bg-blue-600 p-4 text-white mb-8">
      <div class="container mx-auto">
        <a href="/" class="text-xl font-bold hover:underline"
        >← Back to Examples</a>
      </div>
    </header>
    <div data-container="root" class="">
      <counter-element></counter-element>
    </div>

    <script type="module">
      import { render } from "@async/framework-v0";
      import { CounterElement } from "./component.ts";

      // Register the custom element
      customElements.define("counter-element", CounterElement);

      // Render the component into the container
      const appElement = document.querySelector("counter-element");
      render(
        appElement,
        {
          root: document.querySelector('[data-container="root"]'),
          events: ["click"],
          context: {
            appElement,
          },
        },
      );
    </script>
  </body>
</html>
