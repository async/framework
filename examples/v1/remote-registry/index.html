<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simplified Async Framework - Remote Registry</title>
  </head>
  <body>
    <div id="app" data-container>
      <button
        on:click="remote:counter"
        on:mouseenter="remote:hover"
        on:mouseleave="remote:hover"
        data-remote-count="0"
      >
        Remote handler clicks: 0
      </button>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
