<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>HTMX</title>
  <link href="/css/tailwind.css" rel="stylesheet" />
</head>
<body>
<main id="main" class="min-h-screen bg-slate-50 py-8">
  <div class="mx-auto max-w-7xl px-6">
    <div class="mb-6 rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
      <div class="flex flex-col gap-5 lg:flex-row lg:items-center lg:justify-between">
        <div>
          <h1 class="text-4xl font-semibold tracking-normal text-slate-900">HTMX</h1>
        </div>
        <div class="w-full">
          <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-3">
            <div>
              <button type="button" class="w-full rounded bg-sky-600 px-4 py-2 text-white transition hover:bg-sky-700" id="run" hx-on:click="benchmark.run()">Create 1,000 rows</button>
            </div>
            <div>
              <button type="button" class="w-full rounded bg-sky-600 px-4 py-2 text-white transition hover:bg-sky-700" id="runlots" hx-on:click="benchmark.runLots()">Create 10,000 rows</button>
            </div>
            <div>
              <button type="button" class="w-full rounded bg-sky-600 px-4 py-2 text-white transition hover:bg-sky-700" id="add" hx-on:click="benchmark.add()">Append 1,000 rows</button>
            </div>
            <div>
              <button type="button" class="w-full rounded bg-sky-600 px-4 py-2 text-white transition hover:bg-sky-700" id="update" hx-on:click="benchmark.update()">Update every 10th row</button>
            </div>
            <div>
              <button type="button" class="w-full rounded bg-sky-600 px-4 py-2 text-white transition hover:bg-sky-700" id="clear" hx-on:click="benchmark.clear()">Clear</button>
            </div>
            <div>
              <button type="button" class="w-full rounded bg-sky-600 px-4 py-2 text-white transition hover:bg-sky-700" id="swaprows" hx-on:click="benchmark.swapRows()">Swap Rows</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <table class="w-full border-collapse bg-white text-sm text-slate-900 test-data">
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>
<script src="dist/htmx.min.js"></script>
<script src="dist/main.js"></script>
</body>
</html>
